workflows:

  # ─────────────────────────────────────────────
  # Android Release APK
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        PACKAGE_NAME: "com.orangestoapples.app"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Bundle JS for Android
        script: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # iOS TestFlight
  # ─────────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_cred
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: Z4742TC256
        APP_STORE_CONNECT_ISSUER_ID: 69a6de73-12f3-47e3-e053-5b8c7c11a4d1
        APP_APPLE_TEAM_ID: YQGQU3RV34
        BUNDLE_ID: com.orangestoapples.app
        XCODE_WORKSPACE: "ios/Oranges_To_Apples.xcworkspace"
        XCODE_SCHEME: "Oranges_To_Apples"

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Bundle JS for iOS
        script: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/

      - name: Set Xcode project team
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APP_APPLE_TEAM_ID;/g" ios/*.xcodeproj/project.pbxproj || true

      - name: Build IPA for TestFlight
        script: |
          # Write ASC private key to temp file for xcodebuild auth
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8

          # Archive
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/OTA.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APP_APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            | xcpretty

          # Export IPA
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APP_APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/OTA.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          rm /tmp/asc_key.p8

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true
