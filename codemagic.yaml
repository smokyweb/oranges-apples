workflows:

  # ─────────────────────────────────────────────
  # Android Release APK
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        PACKAGE_NAME: "com.orangestoapples.app"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Bundle JS for Android
        script: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # iOS TestFlight
  # ─────────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic Orangestoapples
    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_cred
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: 59WAASGLSX
        APP_STORE_CONNECT_ISSUER_ID: 69a6de73-12f3-47e3-e053-5b8c7c11a4d1
        APP_APPLE_TEAM_ID: YQGQU3RV34
        BUNDLE_ID: com.orangestoapples.app
        XCODE_WORKSPACE: "ios/Oranges_To_Apples.xcworkspace"
        XCODE_SCHEME: "Oranges_To_Apples"

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Bundle JS for iOS
        script: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/

      - name: Set Xcode project team
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APP_APPLE_TEAM_ID;/g" ios/*.xcodeproj/project.pbxproj || true

      - name: Fetch signing certificate and provisioning profile
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          keychain add-certificates

      - name: Build IPA for TestFlight
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "External Testers"
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true
