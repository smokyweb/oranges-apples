workflows:

  # ─────────────────────────────────────────────
  # Android Release APK
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      vars:
        PACKAGE_NAME: "com.orangestoapples.app"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Bundle JS for Android
        script: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # iOS TestFlight
  # ─────────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    environment:
      node: 20.18.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_cred
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: Z4742TC256
        APP_STORE_CONNECT_ISSUER_ID: 69a6de73-12f3-47e3-e053-5b8c7c11a4d1
        APP_APPLE_TEAM_ID: YQGQU3RV34
        BUNDLE_ID: com.orangestoapples.app
        XCODE_WORKSPACE: "ios/Oranges_To_Apples.xcworkspace"
        XCODE_SCHEME: "Oranges_To_Apples"

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Bundle JS for iOS
        script: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/

      - name: Set Xcode project team
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APP_APPLE_TEAM_ID;/g" ios/*.xcodeproj/project.pbxproj || true

      - name: Build IPA for TestFlight
        script: |
          set -e
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8

          ARCHIVE_PATH="$CM_BUILD_DIR/OTA.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/ipa"
          mkdir -p "$EXPORT_PATH"

          echo "=== Archiving ==="
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APP_APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          echo "=== Archive done. Contents: ==="
          ls -la "$ARCHIVE_PATH" || echo "Archive missing!"

          python3 -c "
import os
team = os.environ['APP_APPLE_TEAM_ID']
plist = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
<plist version=\"1.0\"><dict>
<key>method</key><string>app-store</string>
<key>teamID</key><string>''' + team + '''</string>
<key>uploadBitcode</key><false/>
<key>uploadSymbols</key><true/>
</dict></plist>'''
open('/tmp/export_options.plist','w').write(plist)
print('Plist written')
"

          echo "=== Exporting IPA ==="
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/asc_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          echo "=== Export contents: ==="
          ls -la "$EXPORT_PATH"
          rm /tmp/asc_key.p8

      - name: Upload to TestFlight
        script: |
          # Write key for altool
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          # Find IPA in build dir first, then broader search
          IPA=$(find "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null | head -1)
          [ -z "$IPA" ] && IPA=$(find ~ /tmp /var -name "*.ipa" 2>/dev/null | grep -v Pods | head -1)
          echo "Found IPA: $IPA"

          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA found"
            find ~ -name "*.ipa" 2>/dev/null || true
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kevin@bluestoneapps.com
        notify:
          success: true
          failure: true
